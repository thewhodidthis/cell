<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Helps create generative art patterns using CSS">
    <title>cell.js</title>
    <link rel="icon" href="//example.thewhodidthis.com/favicon.ico">
    <link rel="preload" href="index.css" as="style">
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
  </head>
  <body>
    <figure>
      <div is="simple-grid" data-name="Dialog between emotion and method" data-size="24">

      </div>
      <figcaption>
        <p><strong><a href="https://github.com/thewhodidthis/cell">cell.js</a></strong> Grid friendly paint API based pattern maker</p>
      </figcaption>
    </figure>
  </body>
</html>
